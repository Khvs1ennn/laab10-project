<head>
  <title>Analysis Charts</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { background-color: #f5ed5c; }
    .tab-content { padding: 20px; }
    canvas { max-width: 500px; max-height: 300px; margin: 0 auto; display: block; }
    .nav-pills .nav-link { margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="container mt-4">
  <!-- Tab Navigation -->
  <ul class="nav nav-tabs" id="chartTabs" role="tablist">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#barTab">Bar Chart</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#lineTab">Line Chart</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#pieTab">Pie Chart</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#doughnutTab">Doughnut Chart</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#radarTab">Radar Chart</button></li>
  </ul>

  <!-- Tab Content -->
  <div class="tab-content">
    <div class="tab-pane fade show active" id="barTab">
      <h3 class="text-center">Revenue by Quarter</h3>
      <canvas id="barChart"></canvas>
    </div>
    <div class="tab-pane fade show active" id="lineTab">
      <h3 class="text-center">Growth Trend</h3>
      <canvas id="lineChart"></canvas>
    </div>
    <div class="tab-pane fade show active" id="pieTab">
      <h3 class="text-center">Market Share</h3>
      <canvas id="pieChart"></canvas>
    </div>
    <div class="tab-pane fade show active" id="doughnutTab">
      <h3 class="text-center">Product Distribution</h3>
      <canvas id="doughnutChart"></canvas>
    </div>
    <div class="tab-pane fade show active" id="radarTab">
      <h3 class="text-center">Performance Radar</h3>
      <canvas id="radarChart"></canvas>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Bar Chart
  new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels: ['Q1','Q2','Q3','Q4'], datasets: [{ label:'Revenue', data:[800,150,180,200], backgroundColor:'#007bff'}] },
    options: { responsive:true, maintainAspectRatio:false }
  });

  // Line Chart
  new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: { labels:['2019','2020','2021','2022','2023'], datasets:[{ label:'Growth %', data:[5,10,8,15,20], borderColor:'#dc3545', fill:false }] },
    options: { responsive:true, maintainAspectRatio:false }
  });

  // Pie Chart
  new Chart(document.getElementById('pieChart'), {
    type: 'pie',
    data: { labels:['Product A','Product B','Product C'], datasets:[{ data:[40,35,25], backgroundColor:['#007bff','#28a745','#ffc107'] }] },
    options: { responsive:true, maintainAspectRatio:false }
  });

  // Doughnut Chart
  new Chart(document.getElementById('doughnutChart'), {
    type: 'doughnut',
    data: { labels:['North','South','East','West'], datasets:[{ data:[25,30,20,25], backgroundColor:['#6f42c1','#20c997','#fd7e14','#0dcaf0'] }] },
    options: { responsive:true, maintainAspectRatio:false }
  });

  // Radar Chart
  new Chart(document.getElementById('radarChart'), {
    type: 'radar',
    data: { labels:['Speed','Quality','Reliability','Cost','Innovation'], datasets:[{ label:'Performance', data:[80,70,75,60,75], backgroundColor:'rgba(13,110,253,0.3)', borderColor:'#0d6efd' }] },
    options: { responsive:true, maintainAspectRatio:false }
  });
</script>

</body>
