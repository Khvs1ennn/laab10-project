<head>
<title>Шагай уралдаан</title>
<link rel="stylesheet" href="laab9.css">
</head>

<body>
<div class="game-wrap">
  <h1>Шагай уралдаан</h1>
 
  <div class="winner-banner" id="winner"></div>
 
  <div class="track">
    <div class="player-row">
      <div class="player-label">Тоглогч 1</div>
      <div class="track-area">
        <div class="pos-bar" id="bar1"></div>
        <div class="track-line"></div>
        <div class="finish-line"></div>
        <div class="horse" id="horse1" style="left:0px">
            <img src="C:\Users\ariunkhuslen\Downloads\photoshop\dh32xml-84277053-a0e2-4c45-b1f5-badd7ff9aae8.png" alt="Horse" style="width:35px;height:35px;">
        </div>
      </div>
      <div class="score-badge" id="score1">0 алхам</div>
    </div>
    <div class="player-row">
      <div class="player-label">Тоглогч 2</div>
      <div class="track-area">
        <div class="pos-bar" id="bar2"></div>
        <div class="track-line"></div>
        <div class="finish-line"></div>
        <div class="horse" id="horse2" style="left:0px">
            <img src="C:\Users\ariunkhuslen\Downloads\photoshop\mori.png" alt="Horse" style="width:35px;height:35px;">
        </div>
      </div>
      <div class="score-badge" id="score2">0 алхам</div>
    </div>
  </div>
 
  <div class="controls">
    <button class="roll-btn" id="rollBtn1" onclick="rollForPlayer(0)">Тоглогч 1 шагай орхих</button>
    <button class="roll-btn" id="rollBtn2" onclick="rollForPlayer(1)" disabled>Тоглогч 2 шагай орхих</button>
    <button class="reset-btn" onclick="resetGame()">Дахин эхлэх</button>
  </div>
 
  <div class="shagai-tray" id="resultTray"></div>
  <div class="log" id="logLine"></div>
</div>
 
<script>
const TYPES = ['horse','camel','goat','sheep'];
const TYPE_MN = { horse:'Морь', camel:'Тэмээ', goat:'Ямаа', sheep:'Хонь' };
const TYPE_CLASS = { horse:'horse-type', camel:'camel-type', goat:'goat-type', sheep:'sheep-type' };
const LIMIT = 10;
let positions = [0, 0];
let turn = 0;
let gameOver = false;
 
function rollShagai() {
  return Array.from({length: 4}, () => TYPES[Math.floor(Math.random() * 4)]);
}
 
function rollForPlayer(playerIdx) {
  if (gameOver || turn !== playerIdx) return;
  const results = rollShagai();
  const horses = results.filter(r => r === 'horse').length;
 
  document.getElementById('resultTray').innerHTML = results.map(r =>
    `<span class="shagai-chip ${TYPE_CLASS[r]}">${TYPE_MN[r]}</span>`
  ).join('');
 
  const log = document.getElementById('logLine');
  if (horses === 0) {
    log.textContent = `Тоглогч ${playerIdx+1}: Морь байхгүй — урагшлахгүй.`;
  } else {
    positions[playerIdx] += horses;
    log.textContent = `Тоглогч ${playerIdx+1}: ${horses} морь → ${horses} алхам урагшилсан! Нийт: ${positions[playerIdx]}`;
  }
 
  updateTrack();
 
  if (positions[playerIdx] >= LIMIT) {
    endGame(playerIdx);
    return;
  }
 
  turn = 1 - turn;
  document.getElementById('rollBtn1').disabled = (turn !== 0);
  document.getElementById('rollBtn2').disabled = (turn !== 1);
}
 
function updateTrack() {
  for (let i = 0; i < 2; i++) {
    const pct = Math.min(positions[i] / LIMIT * 100, 100);
    const horse = document.getElementById('horse' + (i+1));
    const bar = document.getElementById('bar' + (i+1));
    const trackWidth = horse.parentElement.offsetWidth - 24;
    horse.style.left = Math.round(pct / 100 * trackWidth) + 'px';
    bar.style.width = pct + '%';
    document.getElementById('score' + (i+1)).textContent = positions[i] + ' / ' + LIMIT + ' алхам';
  }
}
 
function endGame(winner) {
  gameOver = true;
  const banner = document.getElementById('winner');
  banner.style.display = 'block';
  banner.textContent = 'Тоглогч ' + (winner+1) + ' хожлоо! (' + positions[winner] + ' алхам)';
  document.getElementById('rollBtn1').disabled = true;
  document.getElementById('rollBtn2').disabled = true;
}
 
function resetGame() {
  positions = [0, 0];
  turn = 0;
  gameOver = false;
  document.getElementById('winner').style.display = 'none';
  document.getElementById('resultTray').innerHTML = '';
  document.getElementById('logLine').textContent = '';
  document.getElementById('rollBtn1').disabled = false;
  document.getElementById('rollBtn2').disabled = true;
  updateTrack();
}
 
window.addEventListener('resize', updateTrack);
setTimeout(updateTrack, 100);
</script>
</body>
