<head>
<title>Blockchain Визуалчлал</title>
</head>
<link rel="stylesheet" href="algoritm10.css">
<body>
<h1>Blockchain</h1>

<div class="controls">
  <input type="text" id="data-input" placeholder="Дата оруулна уу (жнь: Alice → Bob: 100₮)" />
  <button onclick="addBlock()">+ Block нэмэх</button>
  <button onclick="resetChain()">↺ Шинэчлэх</button>
</div>

<div class="node-row" id="node-count"></div>
<div class="chain" id="chain"></div>
<div class="status-bar" id="status-bar"></div>
<p class="hint"></p>

<script>
let chain = [];

function simpleHash(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) + h) ^ str.charCodeAt(i);
    h = h >>> 0;
  }
  return h.toString(16).padStart(8, '0');
}

function calcHash(index, prevHash, data, nonce) {
  return simpleHash(`${index}${prevHash}${data}${nonce}`);
}

function mineBlock(index, prevHash, data) {
  let nonce = 0, hash;
  do {
    hash = calcHash(index, prevHash, data, nonce);
    nonce++;
  } while (!hash.startsWith('0'));
  return { hash, nonce: nonce - 1 };
}

function addBlock(data) {
  const input = document.getElementById('data-input');
  const d = data || input.value.trim() || `Гүйлгээ #${chain.length}`;
  const prevHash = chain.length === 0 ? '00000000' : chain[chain.length - 1].hash;
  const index = chain.length;
  const { hash, nonce } = mineBlock(index, prevHash, d);
  chain.push({ index, data: d, prevHash, hash, nonce });
  input.value = '';
  render();
}

function resetChain() {
  chain = [];
  addBlock('Genesis block — эхлэл');
  addBlock('Alice → Bob: 500₮');
  addBlock('Bob → Carol: 200₮');
  addBlock('Carol → Alice: 100₮');
}

function tamperBlock(i) {
  const newData = prompt('Дата өөрчлөх:', chain[i].data);
  if (newData === null) return;
  chain[i].data = newData;
  chain[i].hash = calcHash(chain[i].index, chain[i].prevHash, newData, chain[i].nonce);
  render();
}

function isValid(i) {
  const b = chain[i];
  const expected = calcHash(b.index, b.prevHash, b.data, b.nonce);
  if (b.hash !== expected) return false;
  if (i > 0 && b.prevHash !== chain[i - 1].hash) return false;
  return b.hash.startsWith('0');
}

function shortHash(h) { return h.substring(0, 10) + '…'; }

function render() {
  const container = document.getElementById('chain');
  container.innerHTML = '';

  chain.forEach((b, i) => {
    const valid = isValid(i);

    if (i > 0) {
      const sep = document.createElement('div');
      sep.className = 'arrow-sep';
      const color = valid ? '#aaa' : '#E24B4A';
      sep.innerHTML = `<svg width="30" height="20" viewBox="0 0 30 20"><defs><marker id="a${i}" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="${color}" stroke-width="1.5"/></marker></defs><line x1="2" y1="10" x2="24" y2="10" stroke="${color}" stroke-width="1.5" marker-end="url(#a${i})"/></svg>`;
      container.appendChild(sep);
    }

    const div = document.createElement('div');
    div.className = 'block' + (valid ? '' : ' tampered');
    div.onclick = () => tamperBlock(i);
    div.title = 'Дата өөрчлөх';
    div.innerHTML = `
      <div class="block-header">
        <span class="block-num">Block #${b.index}</span>
        <span class="dot${valid ? '' : ' invalid'}"></span>
      </div>
      <div class="block-body">
        <div>
          <div class="field-label">Дата</div>
          <div class="field-val data-val">${b.data}</div>
        </div>
        <div>
          <div class="field-label">Өмнөх hash</div>
          <div class="field-val hash-val${valid ? '' : ' bad'}">${i === 0 ? '00000000' : shortHash(b.prevHash)}</div>
        </div>
        <div>
          <div class="field-label">Hash</div>
          <div class="field-val hash-val${valid ? '' : ' bad'}">${shortHash(b.hash)}</div>
        </div>
        <div>
          <div class="field-label">Nonce</div>
          <div class="field-val">${b.nonce}</div>
        </div>
      </div>
    `;
    container.appendChild(div);
  });

  const allValid = chain.every((_, i) => isValid(i));
  const sb = document.getElementById('status-bar');
  if (allValid) {
    sb.className = 'status-bar ok';
    sb.textContent = `✓ Chain бүрэн хүчинтэй — бүх ${chain.length} block зөв холбогдсон.`;
  } else {
    const broken = chain.filter((_, i) => !isValid(i)).length;
    sb.className = 'status-bar bad';
    sb.textContent = `✗ ${broken} block эвдэрсэн! Дата өөрчлөгдсөн тул chain хүчингүй болсон.`;
  }

  const nc = document.getElementById('node-count');
  nc.innerHTML = chain.map((_, i) =>
    `<span class="ndot" style="background:${isValid(i) ? '#639922' : '#E24B4A'}"></span>`
  ).join('') + `&nbsp; ${chain.length} node`;
}

resetChain();
</script>
</body>
